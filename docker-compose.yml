version: "3.9"

services:
  # ─── PostgreSQL + TimescaleDB ──────────────────────────────────────────────
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: coldsmart_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: coldsmart_db
      POSTGRES_USER: coldsmart
      POSTGRES_PASSWORD: ${DB_PASSWORD:-coldsmart_pass}
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coldsmart -d coldsmart_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - coldsmart_net

  # ─── Redis ───────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: coldsmart_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_pass} --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - coldsmart_net

  # ─── EMQX MQTT Broker ────────────────────────────────────────────────────
  emqx:
    image: emqx/emqx:5.7.0
    container_name: coldsmart_emqx
    restart: unless-stopped
    environment:
      EMQX_NAME: coldsmart_broker
      EMQX_CLUSTER__DISCOVERY_STRATEGY: manual
      EMQX_LISTENERS__TCP__DEFAULT__BIND: "0.0.0.0:1883"
      EMQX_LISTENERS__WS__DEFAULT__BIND: "0.0.0.0:8083"
      EMQX_LISTENERS__SSL__DEFAULT__BIND: "0.0.0.0:8883"
      EMQX_AUTH__FILE__ENABLE: "true"
      EMQX_ALLOW_ANONYMOUS: "false"
      EMQX_DASHBOARD__LISTENERS__HTTP__BIND: "0.0.0.0:18083"
    volumes:
      - emqx_data:/opt/emqx/data
      - emqx_log:/opt/emqx/log
      - ./infra/emqx/acl.conf:/opt/emqx/data/acl.conf
    ports:
      - "1883:1883"     # MQTT TCP
      - "8083:8083"     # MQTT WebSocket
      - "8883:8883"     # MQTT SSL/TLS
      - "18083:18083"   # EMQX Dashboard
    healthcheck:
      test: ["CMD", "/opt/emqx/bin/emqx", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - coldsmart_net

  # ─── MinIO Object Storage ─────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: coldsmart_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-coldsmart_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minio_secret_pass}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"     # API
      - "9001:9001"     # Console
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - coldsmart_net

  # ─── FastAPI Backend ──────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: coldsmart_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://coldsmart:${DB_PASSWORD:-coldsmart_pass}@postgres:5432/coldsmart_db
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_pass}@redis:6379/0
      MQTT_BROKER_HOST: emqx
      MQTT_BROKER_PORT: 1883
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-coldsmart_minio}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minio_secret_pass}
      SECRET_KEY: ${SECRET_KEY:-change-this-in-production-please}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      DEBUG: "false"
      LOG_LEVEL: INFO
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      emqx:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - coldsmart_net

