%% =============================================================================
%% ColdSmart EMQX Broker Access Control List (ACL)
%% Enforces strict topic isolation per device client ID to prevent spoofing
%% =============================================================================

%% 1. Allow the server backend administrative client full access to all topics
{allow, {username, "coldsmart_server"}, all, ["cs/#"]}.

%% 2. Allow devices to publish telemetry, status, and feedback only on their own channels
{allow, all, publish, [
    "cs/+/device/${clientid}/telemetry",
    "cs/+/device/${clientid}/status",
    "cs/+/device/${clientid}/ota/progress",
    "cs/+/device/${clientid}/ota/result",
    "cs/+/device/${clientid}/diagnostics/result"
]}.

%% 3. Allow devices to subscribe to controls/triggers only on their own channels
{allow, all, subscribe, [
    "cs/+/device/${clientid}/commands",
    "cs/+/device/${clientid}/ota/start",
    "cs/+/device/${clientid}/diagnostics/request"
]}.

%% 4. Deny all other publish and subscribe attempts globally
{deny, all}.
